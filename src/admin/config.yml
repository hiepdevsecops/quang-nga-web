# ===== Cấu hình Decap CMS =====
# Sau khi deploy lên Netlify, bật Identity + Git Gateway thì đăng nhập được.
backend:
  name: git-gateway
  branch: main            # nhánh chính của kho GitHub

# Ngôn ngữ giao diện admin
locale: vi

# Đường dẫn bài viết: bỏ dấu tiếng Việt cho chuẩn SEO (vd: sua-bep-tu-washi)
slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

# Nơi lưu ảnh tải lên
media_folder: "src/uploads"
public_folder: "/uploads"

# Nút "Xem trước trang" trong admin
site_url: https://suachuaquangnga.netlify.app

collections:
  - name: "baiviet"
    label: "Bài viết"
    label_singular: "Bài viết"
    folder: "src/posts"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{date}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Tiêu đề", name: "title", widget: "string" }
      - { label: "Ngày đăng", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Tóm tắt ngắn", name: "excerpt", widget: "string", required: false, hint: "1–2 câu hiện ở danh sách bài viết" }
      - label: "SEO (tùy chọn – giúp lên Google)"
        name: "seo"
        widget: "object"
        collapsed: true
        required: false
        fields:
          - { label: "Tiêu đề SEO", name: "metaTitle", widget: "string", required: false, hint: "Dòng tiêu đề hiện trên Google. Nên 50–60 ký tự và chứa từ khóa chính, vd: 'Sửa bếp từ lỗi E3 tại nhà | Quang Nga'. Để trống sẽ dùng tiêu đề bài." }
          - { label: "Mô tả SEO", name: "metaDescription", widget: "text", required: false, hint: "Đoạn mô tả hiện dưới tiêu đề trên Google (~150 ký tự, chứa từ khóa). Để trống sẽ dùng tóm tắt." }
          - { label: "Từ khóa / Thẻ chủ đề", name: "keywords", widget: "list", required: false, hint: "Mỗi từ khóa gõ rồi Enter, vd: sửa bếp từ, lỗi E3, thay mặt kính. Sẽ hiện thành thẻ dưới bài viết." }
      - { label: "Ảnh đại diện", name: "cover", widget: "image", required: false }
      - { label: "Video (link YouTube)", name: "video", widget: "string", required: false, hint: "Dán link YouTube nếu có, vd https://youtu.be/abc12345678 — để trống nếu không dùng" }
      - { label: "Nội dung", name: "body", widget: "markdown" }

  - name: "caidat"
    label: "Cài đặt website"
    files:
      - name: "lienhe"
        label: "Thông tin liên hệ"
        file: "src/_data/lienhe.json"
        description: "Số điện thoại, Zalo, địa chỉ, bản đồ hiển thị trên toàn web"
        fields:
          - { label: "Số điện thoại 1 (chính)", name: "phone1", widget: "string", hint: "Cứ gõ như bình thường, vd: 035 321 8558" }
          - { label: "Số điện thoại 2 (phụ)", name: "phone2", widget: "string", required: false }
          - { label: "Số Zalo", name: "zalo", widget: "string", required: false }
          - { label: "Địa chỉ", name: "address", widget: "string", required: false, hint: "Để trống nếu chưa muốn hiện" }
          - { label: "Khu vực phục vụ", name: "area", widget: "string", required: false }
          - { label: "Giờ làm việc / Hỗ trợ", name: "hours", widget: "string", required: false }
          - { label: "Bản đồ – tìm theo", name: "mapQuery", widget: "string", required: false, hint: "Dán địa chỉ đầy đủ để ghim Google Map đúng điểm" }
